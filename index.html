<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص لـ AYA 💖</title>
    <style>
        :root {
            --accent: #ff2e63;
            --glow: #00d1ff;
            --bg: #05020a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* تأثير القلوب المتساقطة */
        .heart {
            position: absolute;
            color: var(--accent);
            font-size: 15px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 10;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .main-card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        h1 { font-size: 28px; text-shadow: 0 0 10px var(--accent); margin-bottom: 5px; }
        .sub-text { font-size: 14px; opacity: 0.6; margin-bottom: 20px; }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px var(--accent);
            outline: none;
        }

        .btn-open {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent);
            transition: 0.3s;
        }

        .content { display: none; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* العداد الملون */
        .timer-container {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
        }
        .timer-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            width: 70px;
            border-bottom: 3px solid var(--glow);
        }
        .timer-box span { display: block; font-size: 20px; font-weight: bold; color: var(--glow); }
        .timer-box small { font-size: 10px; opacity: 0.7; }

        /* الكروت التفاعلية */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .gift-card {
            background: rgba(255,255,255,0.05);
            padding: 25px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .gift-card i { font-size: 30px; display: block; margin-bottom: 10px; font-style: normal; }
        
        .msg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--accent), #ff5e62);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            font-size: 13px;
            font-weight: bold;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gift-card.revealed .msg-overlay { transform: translateY(0); }
    </style>
</head>
<body>

<audio id="music" loop>
    <source src="https://www.mboxdrive.com/Amr%20Diab%20-%20Youm%20Talat.mp3" type="audio/mpeg">
</audio>

<div class="main-card" id="login">
    <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
    <h1>جاهزة يا AYA؟</h1>
    <p class="sub-text">مكاني السري المخصص ليكي لوحدك</p>
    <input type="password" id="pass" placeholder="اكتبي الباسورد">
    <br>
    <button class="btn-open" onclick="start()">فتح المفاجأة ❤️</button>
</div>
