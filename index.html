<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص لـ AYA 💖</title>
    <style>
        :root {
            --accent: #ff2e63;
            --glow: #00d1ff;
            --bg: #0a0118; /* لون خلفية داكن جداً لزيادة التباين */
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* لمنع شريط التمرير أثناء القلوب */
        }

        /* تأثير القلوب المتساقطة في الخلفية */
        .heart {
            position: absolute;
            color: var(--accent);
            font-size: 15px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1; /* جعل القلوب خلف العناصر الرئيسية */
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* العنصر الرئيسي الشفاف (Glassmorphism) */
        .main-card {
            width: 90%;
            max-width: 400px;
            /* هذا هو سر الشفافية والبلور */
            background: rgba(255, 255, 255, 0.05); /* شفافية بيضاء خفيفة جداً */
            backdrop-filter: blur(10px); /* تأثير البلور (المغششي) خلف العنصر */
            -webkit-backdrop-filter: blur(10px); /* لدعم متصفحات سـفاري */
            
            border: 1px solid rgba(255, 255, 255, 0.1); /* حد شفاف وخفيف */
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* ظل لإعطاء عمق */
            z-index: 10; /* جعل العناصر الرئيسية فوق القلوب */
            position: relative;
        }

        h1 {
            font-size: 26px;
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 5px;
        }

        .login-subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            background: rgba(0,0,0,0.5); /* خلفية داكنة شفافة لخانة الإدخال */
            color: white;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
            box-shadow: inset 0 0 10px var(--accent);
            transition: 0.3s;
        }
        input:focus {
            box-shadow: inset 0 0 15px var(--accent), 0 0 10px var(--accent);
        }

        .btn-open {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent);
            transition: 0.3s;
        }
        .btn-open:hover {
            box-shadow: 0 0 30px var(--accent);
            transform: scale(1.05);
        }

        /* محتوى الصفحة بعد الدخول */
        .content {
            display: none;
            animation: fadeIn 1.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنسيق العداد */
        .timer-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .timer-box {
            background: rgba(255, 255, 255, 0.03); /* شفافية خفيفة جداً */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            width: 70px;
            border-bottom: 3px solid var(--glow);
        }
        .timer-box span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--glow);
        }
        .timer-box small {
            font-size: 10px;
            opacity: 0.7;
        }

        /* تنسيق الكروت الشبكية (الشفافة أيضاً) */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .gift-card {
            background: rgba(255, 255, 255, 0.02); /* شفافية خفيفة جداً للكروت */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .gift-card i {
            font-size: 30px;
            display: block;
            margin-bottom: 10px;
        }
        
        /* غطاء الكرت عند الفتح */
        .msg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--accent), #ff5e62);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
            box-sizing: border-box;
            font-size: 13px;
            font-weight: bold;
        }
        .gift-card.revealed .msg-overlay {
            transform: translateY(0);
        }

    </style>
</head>
<body>

<audio id="music" loop>
    <source src="15._Youm_Talat.mp3" type="audio/mpeg">
</audio>

<div class="main-card" id="login">
    <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
    <h1>جاهزة يا AYA؟ ❤️</h1>
    <p class="login-subtitle">أكتبي الباسورد عشان تشوفي المفاجأة</p>
    <input type="password" id="pass" placeholder="اكتبي الباسورد هنا">
    <br>
    <button class="btn-open" onclick="start()">فتح المفاجأة ❤️</button>
</div>

<div class="main-card content" id="dashboard">
    <h1 style="margin-bottom: 0;">بحبك يا AYA ❤️</h1>
    <p style="color: var(--glow); font-size: 12px; margin-top: 5px;">أول لقاء: 1/7/2025</p>

    <div class="timer-container">
        <div class="timer-box"><span id="d">0</span><small>يوم</small></div>
        <div class="timer-box"><span id="h">0</span><small>ساعة</small></div>
        <div class="timer-box"><span id="m">0</span><small>دقيقة</small></div>
        <div class="timer-box"><span id="s">0</span><small>ثانية</small></div>
    </div>

    <div class="grid">
        <div class="gift-card" onclick="reveal(this)">
            <i>💌</i>
            <span> 😂🙋دوسي هنا دا الأول</span>
            <div class="msg-overlay">محبتش </div>
        </div>
        <div class="gift-card" onclick="reveal(this)">
            <i>✨</i>
            <span>الثاني</span>
            <div class="msg-overlay">ولا بحب</div>
        </div>
        <div class="gift-card" onclick="reveal(this)">
            <i>💍</i>
            <span>الثالث</span>
            <div class="msg-overlay">ولا هحب حد</div>
        </div>
        <div class="gift-card" onclick="reveal(this)">
            <i>👑</i>
            <span>الرابع</span>
            <div class="msg-overlay">زي ما حبيتك يا اجمل حاجه في حياتي ❤️💋</div>
        </div>
    </div>
    
    <p style="font-size: 12px; margin-top: 20px; opacity: 0.5;">(اضغطي على الكروت عشان تفتح)</p>
</div>

<script>
    // الباسورد الصحيح وتاريخ البداية
    const P = "1420041712004";
    const startD = new Date(2025, 6, 1); // 1 يوليو 2025

    // دالة بدء المفاجأة
    function start() {
        if(document.getElementById('pass').value === P) {
            // تشغيل الأغنية
            document.getElementById('music').play();
            
            // تبديل الشاشات
            document.getElementById('login').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            // بدء تأثير القلوب والعداد
            spawnHearts();
            setInterval(update, 1000);
        } else {
            alert("الباسورد غلط! حاولي تاني يا آية 😉");
        }
    }

    // دالة كشف الكرت عند الضغط
    function reveal(el) {
        el.classList.toggle('revealed');
    }

    // دالة تحديث العداد
    function update() {
        const diff = new Date() - startD;
        document.getElementById('d').innerText = Math.floor(diff / 86400000);
        document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24);
        document.getElementById('m').innerText = Math.floor((diff / 60000) % 60);
        document.getElementById('s').innerText = Math.floor((diff / 1000) % 60);
    }

    // دالة إنشاء القلوب المتساقطة
    function spawnHearts() {
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000); // إزالة القلب بعد انتهاء الحركة
        }, 400); // إنشاء قلب جديد كل 400 مللي ثانية
    }
</script>

</body>
</html>
