<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي السرية</title>
    <style>
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        h1 { color: #38bdf8; font-size: 2rem; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        .heart { color: #f43f5e; font-size: 40px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>أهلاً بك في صفحتي 🤫</h1>
        <p>هذا الموقع تم إنشاؤه عبر GitHub Pages</p>
        <div class="heart">❤️</div>
    </div>
</body>
</html>
